# Glorp Garage — a containerized, sandboxed agent runtime.
#   docker compose up -d --build
#   docker compose logs | grep glsk_        # grab the auto-minted API key
# Agents run their tools inside the container; their files land in the
# `glorp-workspaces` volume, never on your host.

services:
  glorp:
    build: .
    image: glorp-garage
    ports:
      - "4271:4271"
    environment:
      # Standard providers: set the matching key here. For custom providers
      # (custom base URLs), mount your credentials.json instead — see volumes.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      GLORP_GARAGE_AUTH: "required"   # set to "off" only on a trusted private network
      GLORP_AUTO_KEY: "1"
      # Point Garage at a companion service (git tokens + template registry) —
      # see docs/companion-service-spec.md. The lean image doesn't run one;
      # use docker-compose.allinone.yml for the built-in companion.
      GLORP_GARAGE_GIT_TOKEN_URL: "${GLORP_GARAGE_GIT_TOKEN_URL:-}"
      GLORP_GARAGE_GIT_TOKEN_HEADERS: "${GLORP_GARAGE_GIT_TOKEN_HEADERS:-}"
      GLORP_GARAGE_TEMPLATE_REGISTRY_URL: "${GLORP_GARAGE_TEMPLATE_REGISTRY_URL:-}"
      GLORP_GARAGE_TEMPLATE_REGISTRY_HEADERS: "${GLORP_GARAGE_TEMPLATE_REGISTRY_HEADERS:-}"
    volumes:
      - glorp-data:/data                 # API keys + session snapshots (persisted)
      - glorp-workspaces:/workspaces     # agent working dirs (persisted, host-isolated)
      # Reuse your existing model credentials (incl. custom providers), read-only:
      # - ${HOME}/.glorp/credentials.json:/data/credentials.json:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4271/api/v1/health"]
      interval: 15s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    # Optional guardrails for letting agents run wild:
    # mem_limit: 4g
    # cpus: 2.0
    # pids_limit: 512

volumes:
  glorp-data:
  glorp-workspaces:
