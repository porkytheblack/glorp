name: ci

on:
  push:
    branches: [main, preview]
  pull_request:
    branches: [main, preview]
  workflow_dispatch:

# Cancel older runs of the same branch/PR when a new commit comes in.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Backend — typecheck + contract drift-check + tests
        # ANTHROPIC_API_KEY is required by buildGlorp's API-key guard but the
        # real LLM is never called in tests (the mock model handles everything).
        env:
          ANTHROPIC_API_KEY: sk-test
        run: bun run ci

      - name: Client kit — typecheck + build
        run: |
          cd packages/glorp-client
          bun run typecheck
          bun run build

      - name: Build single binary (smoke)
        run: bun run build

      - name: Binary smoke
        env:
          ANTHROPIC_API_KEY: sk-test
        run: |
          ./dist/glorp --version
          ./dist/glorp --help | head -1
